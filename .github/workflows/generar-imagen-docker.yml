name: Generar Imagen Docker en TAR

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-save:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verificar Docker
        run: docker --version

      - name: Construir imagen
        run: docker build -t mi-web-docker .

      - name: Guardar imagen
        run: docker save -o mi-web-docker.tar mi-web-docker

      - name: Verificar TAR
        run: |
          ls -lah
          du -h mi-web-docker.tar

      - name: Subir artefacto
        uses: actions/upload-artifact@v4
        with:
          name: mi-web-docker-tar
          path: mi-web-docker.tar
