<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi Primer Docker - Gema Blancas Badillo</title>
  
  <style>
    /* Reset básico para asegurar consistencia */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      /* Un fondo un poco más oscuro y azulado para temática tech */
      background: #0b1120; 
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      padding: 20px;
    }
    
    .card {
      position: relative;
      width: 100%;
      max-width: 340px;
      height: 460px;
      background: #1e293b; /* Color moderno para tarjetas (Slate 800) */
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 15px 35px rgba(0,0,0,0.6);
      /* Transiciones suaves para la tarjeta entera */
      transition: transform 0.4s ease, box-shadow 0.4s ease;
      /* Variable de color principal (Azul Docker) */
      --clr: #2496ed; 
    }

    /* Efecto 3D de elevación al pasar el cursor */
    .card:hover {
      transform: translateY(-12px);
      box-shadow: 0 25px 45px rgba(36, 150, 237, 0.25);
    }

    /* El círculo decorativo de fondo */
    .circle {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: var(--clr);
      clip-path: circle(150px at 80% 15%);
      transition: clip-path 0.6s ease-in-out;
    }

    /* Expansión del círculo al hacer hover */
    .card:hover .circle {
      clip-path: circle(350px at 80% -10%);
    }

    /* Ícono flotante de Docker */
    .docker-icon {
      position: absolute;
      top: 40px;
      right: 30px;
      width: 80px;
      height: 80px;
      color: white;
      z-index: 10;
      opacity: 0.9;
      transition: transform 0.5s ease;
      /* Drop shadow para el SVG */
      filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3));
    }

    .card:hover .docker-icon {
      transform: scale(1.15) rotate(-5deg);
      opacity: 1;
    }

    /* Contenido de texto y botones */
    .content {
      position: absolute;
      bottom: 0;
      width: 100%;
      padding: 35px 30px;
      color: white;
      z-index: 10;
    }

    /* Etiqueta pequeña superior */
    .tag {
      display: inline-block;
      font-size: 0.8em;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--clr);
      font-weight: 700;
      margin-bottom: 8px;
      transition: color 0.4s;
    }

    .card:hover .tag {
      color: #bae6fd; /* Azul más claro al hacer hover */
    }

    .content h2 {
      margin: 0 0 12px;
      font-size: 2.2em;
      font-weight: 800;
      line-height: 1.1;
      color: #ffffff;
    }

    .content p {
      color: #94a3b8; /* Slate 400 */
      font-size: 0.95em;
      line-height: 1.6;
      margin-bottom: 25px;
      transition: color 0.4s;
    }

    .card:hover .content p {
      color: #f1f5f9; /* Texto más brillante al tener el fondo azul */
    }

    .content a {
      display: inline-block;
      padding: 12px 28px;
      background: white;
      color: #0f172a;
      text-decoration: none;
      border-radius: 40px;
      font-weight: 700;
      font-size: 0.95em;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    }
    
    .content a:hover {
      background: #0f172a;
      color: white;
      box-shadow: 0 6px 20px rgba(0,0,0,0.4);
      transform: translateY(-2px);
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="circle"></div>

      <h2>Mi Primer Docker</h2>
      <p>Proyecto web empaquetado de forma eficiente y segura en un contenedor.<br><br>Desarrollado por <strong>Gema Blancas Badillo</strong>.</p>
