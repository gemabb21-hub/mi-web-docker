<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juego de Gema</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            background-color: #11141a;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Título con tu nombre */
        .header-title {
            color: #ffffff;
            font-size: 2rem;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(255,255,255,0.3);
        }

        svg {
            width: 95vw;
            max-width: 1000px;
            height: auto;
            background-color: #1e222b;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

    <div class="header-title">Juego de Gema 🎯</div>

    <svg id="game" viewBox="0 0 1000 500">
        <g id="targetGroup" transform="translate(850, 250)">
            <circle r="40" fill="#f00" />
            <circle r="30" fill="#fff" />
            <circle r="20" fill="#f00" />
            <circle r="10" fill="#fff" />
            <circle r="4" fill="#ff0" />
        </g>

        <g class="arrows"></g>

        <g id="bowGroup" transform="translate(100, 250)">
            <path id="string" d="M 0,-80 L 0,80" stroke="#fff" stroke-width="2" fill="none"/>
            <path id="bow" d="M 0,-80 Q 60,0 0,80" stroke="#8B4513" stroke-width="5" fill="none"/>
            <g id="readyArrow" class="arrow-angle">
                <line x1="-10" y1="0" x2="60" y2="0" stroke="#fff" stroke-width="3"/>
                <polygon points="60,-5 70,0 60,5" fill="#ff0"/>
            </g>
        </g>
    </svg>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <script>
        const svg = document.querySelector("svg");
        const bowGroup = document.querySelector("#bowGroup");
        const string = document.querySelector("#string");
        const arrowsContainer = document.querySelector(".arrows");

        let svgPoint = svg.createSVGPoint();
        let target = { x: 850, y: 250 };
        let pivot = { x: 100, y: 250 };
        let angle = 0;

        function getMouseSVG(e) {
            if (e.touches && e.touches[0]) {
                svgPoint.x = e.touches[0].clientX;
                svgPoint.y = e.touches[0].clientY;
            } else {
                svgPoint.x = e.clientX;
                svgPoint.y = e.clientY;
            }
            return svgPoint.matrixTransform(svg.getScreenCTM().inverse());
        }

        function aim(e) {
            let point = getMouseSVG(e);
            let nX = point.x - pivot.x;
            let nY = point.y - pivot.y;
            angle = Math.atan2(nY, nX);
            gsap.set(bowGroup, { rotation: angle * (180 / Math.PI) });
        }

        window.addEventListener("mousemove", aim);
        window.addEventListener("touchmove", aim);
        window.addEventListener("mousedown", draw);
        window.addEventListener("touchstart", draw);

        function draw(e) {
            let randomAngle = angle + (Math.random() * Math.PI * 0.03 - 0.015);
            
            const newArrow = document.createElementNS("http://www.w3.org/2000/svg", "g");
            newArrow.innerHTML = `
                <line x1="-10" y1="0" x2="60" y2="0" stroke="#fff" stroke-width="3"/>
                <polygon points="60,-5 70,0 60,5" fill="#ff0"/>
            `;
            arrowsContainer.appendChild(newArrow);
            
            gsap.set(newArrow, {
                x: pivot.x,
                y: pivot.y,
                rotation: randomAngle * (180 / Math.PI)
            });
            
            gsap.timeline()
                .to(string, { duration: 0.05, attr: { d: "M 0,-80 L -30,0 L 0,80" } })
                .to(string, { duration: 0.1, attr: { d: "M 0,-80 L 0,80" }, ease: "elastic.out(1, 0.3)" });

            let distance = 900; 
            let targetX = pivot.x + Math.cos(randomAngle) * distance;
            let targetY = pivot.y + Math.sin(randomAngle) * distance;
            
            gsap.to(newArrow, {
                duration: 0.6,
                x: targetX,
                y: targetY,
                ease: "none",
                onUpdate: function() {
                    let currentX = gsap.getProperty(newArrow, "x");
                    if (currentX >= target.x - 20) {
                        gsap.killTweensOf(newArrow);
                        
                        let text = document.createElementNS("http://www.w3.org/2000/svg", "text");
                        text.setAttribute("x", target.x - 50);
                        text.setAttribute("y", target.y - 60);
                        text.setAttribute("fill", "#ff0");
                        text.setAttribute("font-size", "30");
                        text.setAttribute("font-weight", "bold");
                        text.textContent = "HIT!";
                        svg.appendChild(text);
                        
                        gsap.to(text, { duration: 0.5, opacity: 0, y: "-=30", delay: 0.3, onComplete: () => text.remove() });
                    }
                },
                onComplete: () => {
                    setTimeout(() => newArrow.remove(), 2000);
                }
            });
        }
    </script>
</body>
</html>
